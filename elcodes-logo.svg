<svg width="500" height="500" viewBox="0 0 500 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">elcodes circular coder logo</title>
  <desc id="desc">A 500 by 500 circular vector logo with a four-part Google-color outer ring, dark inner circle, white coder silhouette, and the text elcodes.</desc>

